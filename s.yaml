edition: 3.0.0
name: omni-realtime
access: imbolo


vars: # 全局变量
  region: cn-hangzhou

resources:
  app:
    component: fc3
    props:
      region: ${vars.region}
      functionName: "omni-realtime"
      description: "omni-realtime by serverless devs"
      runtime: custom.debian10
      layers:
        - acs:fc:cn-hangzhou:1560807217091538:layers/omni-realtime/versions/4
      customRuntimeConfig:
        port: 9000
        command:
          - python3
          - server.py
      code: ./code
      handler: handler
      memorySize: 32768
      timeout: 600
      environmentVariables:
        BAILIAN_API_KEY: sk-fed79e5440c74e91ab278685b8884006
        DASHSCOPE_API_KEY: sk-fed79e5440c74e91ab278685b8884006
        PATH: >-
          /var/fc/lang/python3.10/bin:/usr/local/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin:/usr/local/ruby/bin:/opt/bin:/code:/code/bin
        PYTHONPATH: /opt/python:/code/venv/lib/python3.12/site-packages:/code
      triggers:
        - triggerName: httpTrigger
          triggerType: http
          triggerConfig:
            authType: anonymous
            methods:
              - GET
              - POST
              - PUT
              - DELETE
              - HEAD
              - PATCH
  website-domain:
    component: fc3-domain
    props:
      region: ${vars.region}
      domainName: auto
      protocol: HTTP
      routeConfig:
        routes:
          - path: /*
            functionName: ${resources.app.props.functionName}
  # next_function: # 第二个函数的案例，仅供参考
  #  # 如果在当前项目下执行 s deploy，会同时部署模块
  #  # 如果想单独部署当前服务与函数，可以执行 s + 模块名/业务名 + deploy，例如：s next_function deploy
  #  # 如果想单独部署当前函数，可以执行 s + 模块名/业务名 + deploy function，例如：s next_function deploy function
